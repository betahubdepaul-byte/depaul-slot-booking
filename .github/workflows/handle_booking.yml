name: Handle Booking

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action (save_booking or send_email)'
        required: true
        default: 'save_booking'
      booking_data:
        description: 'JSON booking data'
        required: false
      name:
        description: 'Student Name'
        required: false
      email:
        description: 'Student Email'
        required: false
      student_id:
        description: 'Student ID'
        required: false
      course:
        description: 'Course'
        required: false
      subject:
        description: 'Subject'
        required: false
      reason:
        description: 'Reason'
        required: false
      day:
        description: 'Day'
        required: false
      day_display:
        description: 'Day Display'
        required: false
      time_range:
        description: 'Time Range'
        required: false

jobs:
  handle-booking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Save Booking
        if: github.event.inputs.action == 'save_booking'
        env:
          BOOKING_DATA: ${{ github.event.inputs.booking_data }}
          GH_TOKEN: ${{ secrets.GT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 -c "
import base64, json, os, urllib.request
booking_data = os.environ.get('BOOKING_DATA', '[]')
gh_token = os.environ.get('GH_TOKEN')
repo = os.environ.get('REPO')
new_booking = json.loads(booking_data)
req = urllib.request.Request(f'https://api.github.com/repos/{repo}/contents/data/bookings.json', headers={'Authorization': f'Bearer {gh_token}', 'Accept': 'application/vnd.github.v3+json'})
try:
    with urllib.request.urlopen(req) as resp:
        data = json.load(resp)
        sha = data['sha']
        current = json.loads(base64.b64decode(data['content']).decode('utf-8'))
except:
    current = []
    sha = None
current.append(new_booking)
content = base64.b64encode(json.dumps(current, indent=2, ensure_ascii=False).encode('utf-8')).decode()
body = {'message': f\"Booking: {new_booking['name']}\", 'content': content, 'branch': 'main'}
if sha: body['sha'] = sha
req = urllib.request.Request(f'https://api.github.com/repos/{repo}/contents/data/bookings.json', data=json.dumps(body).encode(), headers={'Authorization': f'Bearer {gh_token}', 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json'}, method='PUT')
with urllib.request.urlopen(req) as resp:
    result = json.load(resp)
    print(f\"Booking saved! Commit: {result['commit']['sha'][:8]}\")
"

      - name: Send Email
        if: github.event.inputs.action == 'send_email'
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          NAME: ${{ github.event.inputs.name }}
          EMAIL: ${{ github.event.inputs.email }}
          STUDENT_ID: ${{ github.event.inputs.student_id }}
          COURSE: ${{ github.event.inputs.course }}
          SUBJECT: ${{ github.event.inputs.subject }}
          REASON: ${{ github.event.inputs.reason }}
          DAY: ${{ github.event.inputs.day }}
          DAY_DISPLAY: ${{ github.event.inputs.day_display }}
          TIME_RANGE: ${{ github.event.inputs.time_range }}
        run: |
          python3 -c "
import smtplib, os
from email.mime.text import MIMEText
from email.mime.multipart import MIMEMultipart
name = os.environ.get('NAME')
email = os.environ.get('EMAIL')
student_id = os.environ.get('STUDENT_ID')
course = os.environ.get('COURSE')
subject = os.environ.get('SUBJECT')
reason = os.environ.get('REASON')
day = os.environ.get('DAY')
day_display = os.environ.get('DAY_DISPLAY')
time_range = os.environ.get('TIME_RANGE')
gmail_email = os.environ.get('GMAIL_EMAIL')
gmail_password = os.environ.get('GMAIL_APP_PASSWORD')
admin_email = os.environ.get('ADMIN_EMAIL')
body_html = f'<html><body style=\"font-family: Arial; max-width: 600px; margin: 0 auto; padding: 20px;\"><div style=\"background: #1E4D8C; color: white; padding: 20px; border-radius: 12px 12px 0 0;\"><h2 style=\"margin: 0;\">DePaul Slot Booking — Confirmed</h2></div><div style=\"background: white; padding: 24px; border: 1px solid #e0e0e0; border-top: none; border-radius: 0 0 12px 12px;\"><p>Hi <strong>{name}</strong>,</p><p>Your appointment is confirmed:</p><table style=\"width: 100%; border-collapse: collapse;\"><tr><td style=\"padding: 8px; border-bottom: 1px solid #eee; font-weight: bold;\">Date</td><td style=\"padding: 8px;\">{day}, {day_display}</td></tr><tr><td style=\"padding: 8px; border-bottom: 1px solid #eee; font-weight: bold;\">Time</td><td style=\"padding: 8px;\">{time_range}</td></tr><tr><td style=\"padding: 8px; border-bottom: 1px solid #eee; font-weight: bold;\">Student</td><td style=\"padding: 8px;\">{name} ({student_id})</td></tr><tr><td style=\"padding: 8px; border-bottom: 1px solid #eee; font-weight: bold;\">Course</td><td style=\"padding: 8px;\">{course}</td></tr><tr><td style=\"padding: 8px; border-bottom: 1px solid #eee; font-weight: bold;\">Subject</td><td style=\"padding: 8px;\">{subject}</td></tr><tr><td style=\"padding: 8px;\">Reason</td><td style=\"padding: 8px;\">{reason}</td></tr></table></div></body></html>'
msg = MIMEMultipart('alternative')
msg['From'] = f'Beta Hub <{gmail_email}>'
msg['To'] = email
msg['Cc'] = admin_email
msg['Subject'] = f'Slot Confirmed — {day}, {day_display} at {time_range}'
msg.attach(MIMEText(body_html, 'html'))
server = smtplib.SMTP('smtp.gmail.com', 587)
server.starttls()
server.login(gmail_email, gmail_password)
server.sendmail(gmail_email, [email, admin_email], msg.as_string())
server.quit()
print(f'Email sent to {email} and {admin_email}')
"
