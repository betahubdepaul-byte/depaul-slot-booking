<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DePaul Slot Booking</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #1E4D8C;
      --blue-dark: #0d2847;
      --blue-light: #e8f0fe;
      --green: #d7f0d7;
      --green-accent: #2e7d32;
      --red: #ffcdd2;
      --red-dark: #c62828;
      --mine: #bbdefb;
      --mine-dark: #1565c0;
      --bg: #f0f2f5;
      --card: #fff;
      --text: #1a1a2e;
      --muted: #666;
      --border: #e0e0e0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh
    }

    .screen {
      display: none
    }

    .screen.active {
      display: block
    }

    .center-screen.active {
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 24px
    }

    #step1.active {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 60%, #0a1628 100%)
    }

    /* Cards */
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .1)
    }

    #step1 .card {
      box-shadow: 0 20px 60px rgba(0, 0, 0, .3)
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: var(--blue);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      font-family: Georgia, serif;
      flex-shrink: 0
    }

    .card h1 {
      font-size: 20px;
      color: var(--blue)
    }

    .card .sub {
      font-size: 13px;
      color: var(--muted);
      margin: 4px 0 24px
    }

    /* Steps indicator */
    .steps-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px
    }

    .step-dot {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #ddd
    }

    .step-dot.done {
      background: var(--blue)
    }

    .step-dot.active {
      background: var(--blue);
      opacity: .6
    }

    /* Fields */
    .field {
      margin-bottom: 16px
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
      background: #fafafa;
      outline: none;
      transition: border .2s;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--blue);
      background: #fff
    }

    .field textarea {
      min-height: 72px;
      resize: vertical
    }

    .error-msg {
      color: var(--red-dark);
      font-size: 12px;
      margin-top: 4px;
      display: none
    }

    /* Buttons */
    .btn {
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      transition: all .2s;
      width: 100%
    }

    .btn-primary {
      color: #fff;
      background: var(--blue)
    }

    .btn-primary:hover {
      background: var(--blue-dark)
    }

    .btn-outline {
      color: var(--blue);
      background: #fff;
      border: 1px solid #ddd
    }

    .btn-outline:hover {
      background: #f5f5f5
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed
    }

    /* Date picker grid */
    .date-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 20px
    }

    .date-card {
      padding: 16px 12px;
      border: 2px solid var(--border);
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all .15s;
      background: #fafafa;
    }

    .date-card:hover {
      border-color: var(--blue);
      background: var(--blue-light)
    }

    .date-card.selected {
      border-color: var(--blue);
      background: var(--blue-light);
      box-shadow: 0 0 0 3px rgba(30, 77, 140, .15)
    }

    .date-card .day-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text)
    }

    .date-card .day-date {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px
    }

    .date-card .slot-count {
      font-size: 11px;
      color: var(--green-accent);
      margin-top: 6px;
      font-weight: 600
    }

    .date-card.disabled {
      opacity: .4;
      cursor: not-allowed;
      pointer-events: none
    }

    /* Time slot grid */
    .time-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 20px
    }

    @media(min-width:500px) {
      .time-grid {
        grid-template-columns: repeat(3, 1fr)
      }
    }

    .time-card {
      padding: 14px 8px;
      border: 2px solid var(--border);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all .15s;
      font-size: 13px;
      font-weight: 600;
    }

    .time-card.open {
      background: var(--green);
      border-color: #c8e6c9
    }

    .time-card.open:hover {
      border-color: var(--green-accent);
      background: #c8e6c9
    }

    .time-card.taken {
      background: var(--red);
      border-color: #ef9a9a;
      cursor: not-allowed;
      opacity: .6
    }

    .time-card.yours {
      background: var(--mine);
      border-color: var(--mine-dark)
    }

    .time-card.selected {
      border-color: var(--blue);
      background: var(--blue-light);
      box-shadow: 0 0 0 3px rgba(30, 77, 140, .15)
    }

    .time-card .status {
      font-size: 10px;
      font-weight: 400;
      color: var(--muted);
      margin-top: 2px
    }

    /* Confirmation */
    .confirm-card {
      text-align: center;
      max-width: 480px
    }

    .confirm-card .check {
      font-size: 52px;
      margin-bottom: 12px
    }

    .confirm-card h2 {
      font-size: 22px;
      color: var(--blue);
      margin-bottom: 6px
    }

    .confirm-card .sub-text {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px
    }

    .details-box {
      background: #f8f9fb;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      text-align: left;
      border: 1px solid #e8eaed
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 13px;
      border-bottom: 1px solid #f0f0f0
    }

    .detail-row:last-child {
      border-bottom: none
    }

    .detail-row .lbl {
      font-weight: 600;
      color: var(--muted);
      flex-shrink: 0;
      margin-right: 12px
    }

    .detail-row .val {
      text-align: right;
      word-break: break-word
    }

    .email-status {
      padding: 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: left;
      font-size: 12px;
      line-height: 1.6
    }

    .email-ok {
      background: #e8f5e9;
      border: 1px solid #c8e6c9;
      color: #2e7d32
    }

    .email-fail {
      background: #fff3e0;
      border: 1px solid #ffe0b2;
      color: #e65100
    }

    /* Loading & Toast */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(240, 242, 245, .92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      flex-direction: column;
      gap: 12px
    }

    .loading-overlay.on {
      display: flex
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #ddd;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .6s linear infinite
    }

    .loading-text {
      font-size: 13px;
      color: var(--muted)
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 200;
      display: none
    }

    /* Calendar UI */
    .cal-container {
      margin-bottom: 20px;
    }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .cal-month {
      font-size: 16px;
      font-weight: 700;
      color: var(--blue);
    }

    .cal-nav {
      display: flex;
      gap: 6px;
    }

    .cal-btn {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .15s;
    }

    .cal-btn:hover {
      background: #f5f5f5;
      border-color: var(--blue);
      color: var(--blue);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .cal-day-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-align: center;
      padding-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .cal-item {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      position: relative;
      transition: all .15s;
      border: 1px solid transparent;
      user-select: none;
    }

    .cal-num {
      font-size: 13px;
      font-weight: 600;
    }

    .cal-item.other {
      opacity: 0.3;
      pointer-events: none;
    }

    .cal-item.past {
      opacity: 0.2;
      pointer-events: none;
      background: #f5f5f5;
    }

    .cal-item.restricted {
      background: #f9f9f9;
      color: #ccc;
      cursor: not-allowed;
      pointer-events: none;
    }

    .cal-item.selectable {
      background: #fff;
      border-color: #f0f0f0;
    }

    .cal-item.selectable:hover {
      border-color: var(--blue);
      background: var(--blue-light);
    }

    .cal-item.selected {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
      box-shadow: 0 4px 12px rgba(30, 77, 140, 0.25);
      transform: translateY(-1px);
    }

    .cal-item.today {
      border-color: var(--blue);
      border-style: dashed;
    }

    .avail-text {
      font-size: 8px;
      margin-top: 2px;
      font-weight: 600;
      color: var(--green-accent);
    }

    .cal-item.selected .avail-text {
      color: rgba(255, 255, 255, 0.9);
    }

    .cal-item.full .avail-text {
      color: var(--red-dark);
    }
  </style>
</head>

<body>

  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Loading...</div>
  </div>
  <div class="toast" id="toast"></div>

  <!-- ==================== STEP 1: STUDENT INFO ==================== -->
  <div id="step1" class="screen center-screen active">
    <div class="card">
      <div class="logo-row">
        <div class="logo-icon">D</div>
        <h1>DePaul Slot Booking</h1>
      </div>
      <p class="sub">Enter your details to book an appointment</p>

      <div class="steps-bar">
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
      </div>

      <div class="field">
        <label>Full Name *</label>
        <input type="text" id="f-name" placeholder="e.g. Dhruvik Patel" />
      </div>
      <div class="field">
        <label>DePaul Student ID *</label>
        <input type="text" id="f-id" placeholder="e.g. 2487651" />
      </div>
      <div class="field">
        <label>DePaul Email *</label>
        <input type="email" id="f-email" placeholder="e.g. dpatel@depaul.edu" />
        <div class="error-msg" id="email-err">Please use a @depaul.edu email</div>
      </div>
      <div class="field">
        <label>Course *</label>
        <input type="text" id="f-course" placeholder="e.g. CSC 555 - Mining Big Data" />
      </div>
      <div class="field">
        <label>Subject *</label>
        <input type="text" id="f-subject" placeholder="e.g. Project Review, Office Hours" />
      </div>
      <div class="field">
        <label>Reason *</label>
        <textarea id="f-reason" placeholder="Brief description of why you need this slot..."></textarea>
      </div>

      <button class="btn btn-primary" onclick="goStep2()">Next — Select a Date →</button>
    </div>
  </div>

  <!-- ==================== STEP 2: SELECT DATE ==================== -->
  <div id="step2" class="screen center-screen">
    <div class="card">
      <div class="logo-row">
        <div class="logo-icon">D</div>
        <h1>Select a Date</h1>
      </div>
      <p class="sub" id="step2-user"></p>

      <div class="steps-bar">
        <div class="step-dot done"></div>
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
      </div>

      <div class="cal-container">
        <div class="cal-header">
          <div class="cal-month" id="cal-month-name">April 2026</div>
          <div class="cal-nav">
            <button class="cal-btn" onclick="changeMonth(-1)">←</button>
            <button class="cal-btn" onclick="changeMonth(1)">→</button>
          </div>
        </div>
        <div class="cal-grid" id="calendar-grid"></div>
      </div>

      <button class="btn btn-primary" id="btn-to-step3" disabled onclick="goStep3()">Next — Choose a Time Slot
        →</button>
      <button class="btn btn-outline" style="margin-top:8px" onclick="showScreen('step1')">← Back</button>
    </div>
  </div>

  <!-- ==================== STEP 3: SELECT TIME SLOT ==================== -->
  <div id="step3" class="screen center-screen">
    <div class="card" style="max-width:520px">
      <div class="logo-row">
        <div class="logo-icon">D</div>
        <h1>Choose Your Slot</h1>
      </div>
      <p class="sub" id="step3-info"></p>

      <div class="steps-bar">
        <div class="step-dot done"></div>
        <div class="step-dot done"></div>
        <div class="step-dot active"></div>
      </div>

      <div class="time-grid" id="time-grid"></div>

      <button class="btn btn-primary" id="btn-book" disabled onclick="submitBooking()">Confirm Booking</button>
      <button class="btn btn-outline" style="margin-top:8px" onclick="showScreen('step2')">← Back to Dates</button>
    </div>
  </div>

  <!-- ==================== STEP 4: CONFIRMATION ==================== -->
  <div id="step4" class="screen center-screen">
    <div class="card confirm-card">
      <div class="check">✅</div>
      <h2>Booking Confirmed!</h2>
      <p class="sub-text">Your appointment has been saved.</p>
      <div class="details-box" id="confirm-details"></div>
      <div id="email-status-box"></div>
      <button class="btn btn-primary" onclick="bookAnother()">Book Another Slot</button>
    </div>
  </div>


  <script>
    // ================================================================
    // CONFIG — UPDATE THESE FOR YOUR SETUP
    // ================================================================
    const CONFIG = {
      GITHUB_OWNER: 'betahubdepaul-byte',
      GITHUB_REPO: 'depaul-slot-booking',
      GITHUB_BRANCH: 'main',
      DATA_PATH: 'data/bookings.json',
      
      // To prevent GitHub's security scanner from auto-revoking your token 
      // when you push this file, we must split it into two parts.
      // Generate a NEW token. Put everything AFTER "github_pat_" in GT_TOKEN_P2:
      GT_TOKEN_P1: 'github_pat_',
      GT_TOKEN_P2: '11CBYB3XY0pjoglxjtDtYO_RRLC5Lp1LWSqrlWbO1uy63y63EP9T1N9Yzkh6D8CcQgXPZQCXWMDEFWaflc', // <-- PASTE THE REST OF YOUR NEW TOKEN HERE
      
      get GT_TOKEN() { 
        return this.GT_TOKEN_P2 ? this.GT_TOKEN_P1 + this.GT_TOKEN_P2 : null; 
      },

    };


    // ================================================================
    // STATE
    // ================================================================
    let student = {};
    let bookings = [];
    let fileSha = null;
    let selectedDate = null;  // { name, date, display }
    let selectedSlot = null;  // { id, range }
    let viewMonth = new Date().getMonth();
    let viewYear = new Date().getFullYear();


    // ================================================================
    // STEP 1 → STEP 2
    // ================================================================
    function goStep2() {
      const name = v('f-name');
      const id = v('f-id');
      const email = v('f-email');
      const course = v('f-course');
      const subject = v('f-subject');
      const reason = v('f-reason');

      if (!name || !id || !email || !course || !subject || !reason) {
        toast('Please fill in all fields'); return;
      }
      if (!email.endsWith('@depaul.edu')) {
        document.getElementById('email-err').style.display = 'block'; return;
      }
      document.getElementById('email-err').style.display = 'none';

      student = { name, id, email, course, subject, reason };
      selectedDate = null;
      selectedSlot = null;

      loadBookings().then(() => {
        renderCalendar();
        document.getElementById('step2-user').textContent = `${name} · ${email}`;
        showScreen('step2');
      });
    }

    function v(id) { return document.getElementById(id).value.trim(); }


    // ================================================================
    // STEP 2: CALENDAR SELECTION
    // ================================================================
    function changeMonth(delta) {
      viewMonth += delta;
      if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      renderCalendar();
    }

    function countAvailable(dayDate) {
      const totalSlots = 12; // 10:00-16:00 in 30-min = 12 slots
      const booked = bookings.filter(b => b.dayDate === dayDate).length;
      return totalSlots - booked;
    }

    function renderCalendar() {
      const container = document.getElementById('calendar-grid');
      if (!container) return;

      const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      document.getElementById('cal-month-name').textContent = `${monthNames[viewMonth]} ${viewYear}`;

      const firstDay = new Date(viewYear, viewMonth, 1).getDay();
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let html = '';
      ['S', 'M', 'T', 'W', 'T', 'F', 'S'].forEach(d => html += `<div class="cal-day-label">${d}</div>`);

      // Fill empty days for current month offset
      for (let i = 0; i < firstDay; i++) html += '<div class="cal-item other"></div>';

      for (let d = 1; d <= daysInMonth; d++) {
        const curDate = new Date(viewYear, viewMonth, d);
        const dateStr = curDate.toISOString().split('T')[0];
        const isPast = curDate < today;
        const dayOfWeek = curDate.getDay();
        // Fri (5), Sat (6), Sun (0) restricted per original logic (Mon-Thu only)
        const isRestricted = dayOfWeek === 0 || dayOfWeek === 5 || dayOfWeek === 6;

        const avail = countAvailable(dateStr);
        const sel = selectedDate && selectedDate.date === dateStr;
        const isToday = curDate.getTime() === today.getTime();

        let cls = 'cal-item ';
        if (isPast) cls += 'past';
        else if (isRestricted) cls += 'restricted';
        else {
          cls += 'selectable';
          if (avail <= 0) cls += ' full';
          if (sel) cls += ' selected';
        }
        if (isToday) cls += ' today';

        const dayName = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][dayOfWeek];
        const displayDate = curDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const clickAttr = (isPast || isRestricted || avail <= 0) ? '' : `onclick="selectDate('${dayName}','${dateStr}','${displayDate}')"`;

        html += `
      <div class="${cls}" ${clickAttr}>
        <div class="cal-num">${d}</div>
        ${(!isPast && !isRestricted) ? `<div class="avail-text">${avail <= 0 ? 'Full' : avail + ' open'}</div>` : ''}
      </div>`;
      }

      container.innerHTML = html;
      document.getElementById('btn-to-step3').disabled = !selectedDate;
    }

    function selectDate(name, date, display) {
      selectedDate = { name, date, display };
      selectedSlot = null;
      renderCalendar();
    }


    // ================================================================
    // STEP 2 → STEP 3
    // ================================================================
    function goStep3() {
      if (!selectedDate) return;
      renderTimeGrid();
      document.getElementById('step3-info').textContent =
        `${selectedDate.name}, ${selectedDate.display} · ${student.name}`;
      showScreen('step3');
    }


    // ================================================================
    // STEP 3: TIME SLOT SELECTION
    // ================================================================
    function getTimeSlots() {
      const s = [];
      for (let h = 10; h < 16; h++) {
        for (let m = 0; m < 60; m += 30) {
          const sh = String(h).padStart(2, '0');
          const sm = String(m).padStart(2, '0');
          const et = h * 60 + m + 30;
          const eh = String(Math.floor(et / 60)).padStart(2, '0');
          const em = String(et % 60).padStart(2, '0');
          s.push({ range: `${sh}:${sm} – ${eh}:${em}`, id: `${sh}${sm}` });
        }
      }
      return s;
    }

    function renderTimeGrid() {
      const slots = getTimeSlots();
      let html = '';

      slots.forEach(sl => {
        const bk = bookings.find(b => b.dayDate === selectedDate.date && b.slotId === sl.id);
        const yours = bk && bk.email === student.email;
        const sel = selectedSlot && selectedSlot.id === sl.id;

        let cls = 'time-card ';
        let statusText = '';
        let onclick = '';

        if (yours) {
          cls += 'yours';
          statusText = 'Your booking';
        } else if (bk) {
          cls += 'taken';
          statusText = 'Taken';
        } else {
          cls += sel ? 'selected' : 'open';
          statusText = sel ? 'Selected ✓' : 'Available';
          onclick = `onclick="selectTime('${sl.id}','${sl.range}')"`;
        }

        html += `
      <div class="${cls}" ${onclick}>
        ${sl.range}
        <div class="status">${statusText}</div>
      </div>`;
      });

      document.getElementById('time-grid').innerHTML = html;
      document.getElementById('btn-book').disabled = !selectedSlot;
    }

    function selectTime(id, range) {
      selectedSlot = { id, range };
      renderTimeGrid();
    }


    // ================================================================
    // SUBMIT BOOKING
    // ================================================================
    async function submitBooking() {
      if (!selectedDate || !selectedSlot) return;

      setLoading(true, 'Checking availability...');

      // Re-fetch to check conflicts
      await loadBookings();
      if (bookings.find(b => b.dayDate === selectedDate.date && b.slotId === selectedSlot.id)) {
        setLoading(false);
        toast('This slot was just booked by someone else!');
        renderTimeGrid();
        return;
      }

      const booking = {
        id: Date.now().toString(),
        name: student.name,
        email: student.email,
        studentId: student.id,
        course: student.course,
        subject: student.subject,
        reason: student.reason,
        day: selectedDate.name,
        dayDate: selectedDate.date,
        dayDisplay: selectedDate.display,
        slotId: selectedSlot.id,
        timeRange: selectedSlot.range,
        bookedAt: new Date().toISOString(),
      };

      setLoading(true, 'Saving booking...');
      const success = await saveToGitHub(booking);
      setLoading(false);

      // Build confirmation
      document.getElementById('confirm-details').innerHTML = [
        ['Name', booking.name],
        ['Email', booking.email],
        ['Student ID', booking.studentId],
        ['Course', booking.course],
        ['Subject', booking.subject],
        ['Reason', booking.reason],
        ['Date', `${booking.day}, ${booking.dayDisplay}`],
        ['Time Slot', booking.timeRange],
        ['Booked At', new Date(booking.bookedAt).toLocaleString()],
      ].map(([l, val]) =>
        `<div class="detail-row"><span class="lbl">${l}</span><span class="val">${val}</span></div>`
      ).join('');

      if (success) {
        document.getElementById('email-status-box').innerHTML = `
          <div class="email-status email-ok">
            <strong>Booking confirmed!</strong><br>
            A confirmation email will be sent to ${booking.email} via GitHub Actions.
          </div>`;
      } else {
        document.getElementById('email-status-box').innerHTML = `
          <div class="email-status email-fail">
            <strong>⚠️ Some issues occurred with triggering Actions</strong><br>
            Please check your GitHub token.
          </div>`;
      }

      showScreen('step4');
    }

    async function saveToGitHub(booking) {
      if (!CONFIG.GT_TOKEN) {
        toast('GitHub token missing in CONFIG');
        return false;
      }

      try {
        const url = `https://api.github.com/repos/${CONFIG.GITHUB_OWNER}/${CONFIG.GITHUB_REPO}/actions/workflows/handle_booking.yml/dispatches`;
        const headers = {
          'Authorization': `Bearer ${CONFIG.GT_TOKEN}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        };

        // 1. Trigger save_booking action in the workflow
        const saveRes = await fetch(url, {
          method: 'POST',
          headers: headers,
          body: JSON.stringify({
            ref: CONFIG.GITHUB_BRANCH,
            inputs: {
              action: 'save_booking',
              booking_data: JSON.stringify(booking)
            }
          })
        });

        if (!saveRes.ok) {
           const err = await saveRes.text();
           console.error('Trigger save error:', err);
           toast('Failed to trigger save_booking action');
           return false;
        }

        // 2. Trigger send_email action in the workflow
        const emailRes = await fetch(url, {
          method: 'POST',
          headers: headers,
          body: JSON.stringify({
            ref: CONFIG.GITHUB_BRANCH,
            inputs: {
              action: 'send_email',
              name: booking.name || '',
              email: booking.email || '',
              student_id: booking.studentId || '',
              course: booking.course || '',
              subject: booking.subject || '',
              reason: booking.reason || '',
              day: booking.day || '',
              day_display: booking.dayDisplay || '',
              time_range: booking.timeRange || ''
            }
          })
        });

        if (!emailRes.ok) {
           console.error('Trigger email error');
        }

        bookings.push(booking); // optimistically update local state
        return true;

      } catch (e) {
        console.error('Trigger handle_booking error:', e);
        toast('Network error while triggering actions');
        return false;
      }
    }

    function bookAnother() {
      selectedDate = null;
      selectedSlot = null;
      loadBookings().then(() => {
        renderCalendar();
        showScreen('step2');
      });
    }

    // ================================================================
    // GITHUB API — READ bookings.json
    // ================================================================

    async function loadBookings() {
      setLoading(true, 'Loading bookings...');
      try {
        const url = `https://raw.githubusercontent.com/${CONFIG.GITHUB_OWNER}/${CONFIG.GITHUB_REPO}/${CONFIG.GITHUB_BRANCH}/${CONFIG.DATA_PATH}?t=${Date.now()}`;
        const res = await fetch(url);
        bookings = res.ok ? await res.json() : [];
      } catch { bookings = []; }
      setLoading(false);
    }


    // ================================================================
    // UTILITIES
    // ================================================================
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0, 0);
    }

    function setLoading(on, text) {
      document.getElementById('loading').classList.toggle('on', on);
      if (text) document.getElementById('loading-text').textContent = text;
    }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3500);
    }
  </script>
</body>

</html>
